<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="RaktConnect — blood donation platform">
  <defs>
    <linearGradient id="rc-bg" x1="0%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#37172a"/>
      <stop offset="55%" stop-color="#2a1620"/>
      <stop offset="100%" stop-color="#0c1526"/>
    </linearGradient>
    <linearGradient id="rc-drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBCE74"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="rc-glow" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="rc-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="600" height="360" fill="url(#rc-bg)"/>
  <rect width="600" height="360" fill="url(#rc-dots)"/>
  <rect width="600" height="240" fill="url(#rc-glow)"/>

  <!-- connection network -->
  <g stroke="#D4AF37" stroke-width="1.2" opacity="0.5">
    <line x1="300" y1="180" x2="120" y2="90"/>
    <line x1="300" y1="180" x2="470" y2="70"/>
    <line x1="300" y1="180" x2="90" y2="250"/>
    <line x1="300" y1="180" x2="480" y2="270"/>
    <line x1="300" y1="180" x2="300" y2="300"/>
  </g>
  <g fill="#0b1424" stroke="#D4AF37" stroke-width="1.4" opacity="0.9">
    <circle cx="120" cy="90" r="9"/>
    <circle cx="470" cy="70" r="9"/>
    <circle cx="90" cy="250" r="9"/>
    <circle cx="480" cy="270" r="9"/>
    <circle cx="300" cy="300" r="9"/>
  </g>

  <!-- central blood drop -->
  <g transform="translate(300,180)">
    <path d="M0,-72 C40,-24 66,10 66,42 A66,66 0 1 1 -66,42 C-66,10 -40,-24 0,-72 Z"
          fill="url(#rc-drop)" stroke="#0c1526" stroke-width="3"/>
    <path d="M0,-72 C40,-24 66,10 66,42 A66,66 0 1 1 -66,42 C-66,10 -40,-24 0,-72 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
    <ellipse cx="-20" cy="18" rx="14" ry="20" fill="#ffffff" opacity="0.28"/>
    <path d="M-34 34 h68" stroke="#0A0F1A" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M-34 34 l16 -14 l12 18 l14 -24 l10 20" fill="none" stroke="#0A0F1A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- emergency badge -->
  <g transform="translate(468,120)">
    <rect x="-46" y="-16" width="92" height="32" rx="16" fill="#0b1424" stroke="#D4AF37" stroke-width="1.2"/>
    <circle cx="-24" cy="0" r="5" fill="#ff6b6b"/>
    <text x="-10" y="4" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700">Urgent match</text>
  </g>
</svg>
