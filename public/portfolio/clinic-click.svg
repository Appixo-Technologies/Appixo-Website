<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="Clinic Click — healthcare appointment platform">
  <defs>
    <linearGradient id="cc-bg" x1="0%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#16264a"/>
      <stop offset="55%" stop-color="#12203a"/>
      <stop offset="100%" stop-color="#0c1526"/>
    </linearGradient>
    <linearGradient id="cc-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBCE74"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="cc-glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cc-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="600" height="360" fill="url(#cc-bg)"/>
  <rect width="600" height="360" fill="url(#cc-dots)"/>
  <rect width="600" height="220" fill="url(#cc-glow)"/>

  <!-- floating card: appointment schedule -->
  <g transform="translate(78,66)">
    <rect x="0" y="0" width="248" height="210" rx="20" fill="#0b1424" stroke="#2a3652" stroke-width="1.5"/>
    <rect x="22" y="26" width="120" height="12" rx="6" fill="url(#cc-gold)"/>
    <rect x="22" y="50" width="180" height="8" rx="4" fill="#ffffff" opacity="0.22"/>
    <rect x="22" y="66" width="150" height="8" rx="4" fill="#ffffff" opacity="0.14"/>

    <g transform="translate(22,94)">
      <rect width="204" height="46" rx="12" fill="#111e34" stroke="#22304e" stroke-width="1"/>
      <circle cx="24" cy="23" r="14" fill="url(#cc-gold)"/>
      <path d="M18 23 l4 4 8-9" stroke="#0A0F1A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="48" y="14" width="90" height="7" rx="3.5" fill="#ffffff" opacity="0.7"/>
      <rect x="48" y="27" width="60" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
    </g>

    <g transform="translate(22,150)">
      <rect width="204" height="46" rx="12" fill="#111e34" stroke="#22304e" stroke-width="1"/>
      <circle cx="24" cy="23" r="14" fill="#1c2b47"/>
      <circle cx="24" cy="23" r="14" fill="none" stroke="#D4AF37" stroke-width="1.4" opacity="0.6"/>
      <rect x="48" y="14" width="80" height="7" rx="3.5" fill="#ffffff" opacity="0.5"/>
      <rect x="48" y="27" width="50" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
    </g>
  </g>

  <!-- pulse card, bottom-right -->
  <g transform="translate(352,206)">
    <rect x="0" y="0" width="176" height="92" rx="16" fill="#0b1424" stroke="#2a3652" stroke-width="1.5"/>
    <text x="18" y="26" fill="#9fb0c9" font-family="Arial, sans-serif" font-size="11" letter-spacing="0.5">Next visit</text>
    <text x="18" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-weight="700" font-size="17">4:30 PM</text>
    <path d="M14 72 h20 l8 -16 l10 26 l8 -18 l6 8 h96" fill="none" stroke="url(#cc-gold)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- cross badge -->
  <g transform="translate(452,58)">
    <circle cx="0" cy="0" r="30" fill="url(#cc-gold)"/>
    <rect x="-4" y="-14" width="8" height="28" rx="3" fill="#0A0F1A"/>
    <rect x="-14" y="-4" width="28" height="8" rx="3" fill="#0A0F1A"/>
  </g>
</svg>
