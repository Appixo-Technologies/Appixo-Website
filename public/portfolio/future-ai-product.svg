<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="Future AI Product — coming soon">
  <defs>
    <linearGradient id="ai-bg" x1="0%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#2a2410"/>
      <stop offset="55%" stop-color="#1e1a10"/>
      <stop offset="100%" stop-color="#0c1526"/>
    </linearGradient>
    <linearGradient id="ai-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBCE74"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="ai-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#ai-bg)"/>
  <rect width="600" height="360" fill="url(#ai-glow)"/>

  <!-- neural network lines -->
  <g stroke="#D4AF37" stroke-width="1" opacity="0.45">
    <line x1="150" y1="120" x2="300" y2="90"/>
    <line x1="150" y1="120" x2="300" y2="180"/>
    <line x1="150" y1="220" x2="300" y2="180"/>
    <line x1="150" y1="220" x2="300" y2="260"/>
    <line x1="150" y1="120" x2="300" y2="260"/>
    <line x1="300" y1="90" x2="450" y2="150"/>
    <line x1="300" y1="180" x2="450" y2="150"/>
    <line x1="300" y1="180" x2="450" y2="230"/>
    <line x1="300" y1="260" x2="450" y2="230"/>
  </g>

  <g fill="#0b1424" stroke="url(#ai-gold)" stroke-width="1.6">
    <circle cx="150" cy="120" r="8"/>
    <circle cx="150" cy="220" r="8"/>
    <circle cx="300" cy="90" r="7"/>
    <circle cx="300" cy="180" r="10"/>
    <circle cx="300" cy="260" r="7"/>
    <circle cx="450" cy="150" r="8"/>
    <circle cx="450" cy="230" r="8"/>
  </g>
  <circle cx="300" cy="180" r="4" fill="url(#ai-gold)"/>

  <!-- chip / core module -->
  <g transform="translate(300,180)">
    <rect x="-46" y="-46" width="92" height="92" rx="18" fill="none" stroke="url(#ai-gold)" stroke-width="2" opacity="0.85"/>
    <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#0b1424" stroke="#D4AF37" stroke-width="1.2"/>
    <circle cx="-9" cy="-9" r="2.6" fill="#D4AF37"/>
    <circle cx="9" cy="-9" r="2.6" fill="#D4AF37"/>
    <circle cx="-9" cy="9" r="2.6" fill="#D4AF37"/>
    <path d="M-4 9 h8" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- coming soon badge -->
  <g transform="translate(300,296)">
    <rect x="-78" y="-16" width="156" height="32" rx="16" fill="#0b1424" stroke="#D4AF37" stroke-width="1.2"/>
    <text x="0" y="5" fill="#EBCE74" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">IN RESEARCH</text>
  </g>
</svg>
